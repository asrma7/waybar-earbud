name: CI and Release

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  PACKAGE_NAME: waybar-earbud-linux
  GH_REPO: asrma7/waybar-earbud

jobs:
  build:
    name: Build and test (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            libbluetooth-dev \
            libglib2.0-dev \
            pkg-config

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j2

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Package binary
        run: |
          asset="${PACKAGE_NAME}-${{ matrix.arch }}"
          mkdir -p "dist/${asset}"
          cp build/waybar-earbud "dist/${asset}/"
          cp README.md install.sh "dist/${asset}/"
          tar -C dist -czf "dist/${asset}.tar.gz" "${asset}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ matrix.arch }}
          path: dist/${{ env.PACKAGE_NAME }}-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: ${{ env.PACKAGE_NAME }}-*
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/*.tar.gz --repo "$GH_REPO" --clobber
          else
            gh release create "$TAG" dist/*.tar.gz --repo "$GH_REPO" --generate-notes
          fi
